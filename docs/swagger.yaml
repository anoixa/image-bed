info:
  contact: {}
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username and password, returns access token
        and sets refresh token cookie
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.userAuthRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/api.loginResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      summary: User login
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user by invalidating session. Works with any combination
        of cookies (refresh_token, device_id, or both). Always clears cookies and
        returns 200 for idempotency.
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful or already logged out
          schema:
            $ref: '#/definitions/common.Response'
      summary: User logout
      tags:
      - auth
  /api/auth/me:
    get:
      description: 返回当前 JWT 登录用户的基础资料
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.CurrentUserResponse'
              type: object
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取当前用户信息
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh_token and device_id cookies
      produces:
      - application/json
      responses:
        "200":
          description: Refresh token successful
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/api.loginResponse'
              type: object
        "401":
          description: Refresh token or device ID not found / invalid
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      summary: Refresh access token
      tags:
      - auth
  /api/v1/admin/configs:
    get:
      consumes:
      - application/json
      description: Get list of system configurations including storage and image processing
        settings
      parameters:
      - description: 'Filter by category: storage, image_processing'
        in: query
        name: category
        type: string
      - description: Only show enabled configs
        in: query
        name: enabled_only
        type: boolean
      - description: 'Mask sensitive information (default: true)'
        in: query
        name: mask_sensitive
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Configuration list
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: List system configurations
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Create a new system configuration (storage or image processing)
      parameters:
      - description: Configuration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SystemConfigStoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Configuration created successfully
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: Invalid request or configuration test failed
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Create configuration
      tags:
      - admin
  /api/v1/admin/configs/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a system configuration by ID
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Configuration deleted successfully
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: Invalid config ID
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: Config not found
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Delete configuration
      tags:
      - admin
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific configuration
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      - description: 'Mask sensitive information (default: true)'
        in: query
        name: mask_sensitive
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Configuration details
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: Invalid config ID
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: Config not found
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Get configuration details
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Update an existing system configuration
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      - description: Configuration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SystemConfigStoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Configuration updated successfully
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: Invalid request or configuration test failed
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: Config not found
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Update configuration
      tags:
      - admin
  /api/v1/admin/configs/{id}/default:
    post:
      consumes:
      - application/json
      description: Set a configuration as the default for its category
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Default config set successfully
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: Invalid config ID or storage provider not loaded
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: Config not found
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Set default configuration
      tags:
      - admin
  /api/v1/admin/configs/{id}/disable:
    post:
      consumes:
      - application/json
      description: Disable a configuration without deleting it
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Config disabled successfully
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: Invalid config ID
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Disable configuration
      tags:
      - admin
  /api/v1/admin/configs/{id}/enable:
    post:
      consumes:
      - application/json
      description: Enable a previously disabled configuration
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Config enabled successfully
          schema:
            $ref: '#/definitions/common.Response'
